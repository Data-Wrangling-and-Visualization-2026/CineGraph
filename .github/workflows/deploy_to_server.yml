on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd CineGraph

            git checkout deploy
            git pull origin deploy

            # This is used to download the init.sql
            if ! command -v gdown &> /dev/null; then
              pip install gdown
            fi

            TARGET_DIR="src/backend/services/db_service"
            TARGET_FILE="${TARGET_DIR}/init.db"

            echo "Downloading init.db from Google Drive..."
            gdown "https://drive.google.com/uc?id=${{ secrets.GDRIVE_INIT_DB_ID }}" \
              -O "${TARGET_FILE}" --force
            echo "Download complete."

            cd src/infra

            # Rebuild and restart the Docker containers in the background
            docker compose up -d --build

            docker image prune -f