services:
  backend:
    build: ../backend
    container_name: backend
    volumes:
      - ../backend/data:/app/data
      - ../backend/emotion_analysis/embeddings:/app/emotion_analysis/embeddings
      - ../backend/preprocessing/ready_data:/app/preprocessing/ready_data
      - ../backend/emotion_analysis/weights:/app/emotion_analysis/weights
      - ../backend/generated_sql:/app/generated_sql
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"

  frontend:
    build: ../frontend
    container_name: frontend
    ports:
      - "${FRONT_PORT}:${FRONT_PORT}"
    depends_on:
      - backend
    env_file:
      - .env

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres_db
    restart: unless-stopped

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/services/db_service/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: